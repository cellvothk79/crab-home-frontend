<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦀 我们的家</title>
<meta name="theme-color" content="#0c0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0b0e;--s1:#16151a;--s2:#1e1d23;--bd:#2a2930;--t:#e4e0d8;--td:#7d7a72;--tf:#4a4844;--ac:#d4a574;--acd:rgba(212,165,116,.1);--ub:#1f1c17;--ubd:rgba(212,165,116,.18);--bb:#16151a;--bbd:#2a2930;--r:18px;--f:-apple-system,"SF Pro Text","Helvetica Neue","PingFang SC",sans-serif}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--t);font-size:15px;line-height:1.55}
.app{display:flex;height:100dvh}
.sidebar{width:260px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:transform .25s}
.sb-header{padding:14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sb-header h2{font-size:15px;font-weight:600}
.sb-new{background:var(--acd);border:1px solid rgba(212,165,116,.2);color:var(--ac);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--f)}
.sb-list{flex:1;overflow-y:auto;padding:6px}.sb-list::-webkit-scrollbar{display:none}
.sb-item{padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--td);margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;transition:.12s}
.sb-item:active,.sb-item.active{background:var(--s2);color:var(--t)}
.sb-item .sb-del{display:none;background:none;border:none;color:var(--tf);font-size:16px;cursor:pointer;padding:0 4px}
.sb-item.active .sb-del,.sb-item:hover .sb-del{display:block}
.sb-bottom{padding:12px;border-top:1px solid var(--bd);display:flex;gap:6px}
.sb-bottom button{flex:1;padding:8px;background:var(--s2);border:1px solid var(--bd);color:var(--td);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--f)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--s1)}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:none;border:none;color:var(--td);font-size:20px;cursor:pointer;padding:2px 6px;display:none}
.header h1{font-size:16px;font-weight:600}
.header h1 span{color:var(--td);font-weight:400;font-size:12px;margin-left:6px}
.model-sel{background:var(--bg);border:1px solid var(--bd);color:var(--td);border-radius:8px;padding:5px 8px;font-size:11px;font-family:var(--f);outline:none}
.messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:4px}.messages::-webkit-scrollbar{display:none}
.msg-time{font-size:10px;color:var(--tf);padding:0 4px;margin-top:8px;margin-bottom:2px;text-align:center}
.msg{max-width:82%;padding:9px 13px;word-break:break-word;font-size:14.5px;line-height:1.55}
.msg.user{align-self:flex-end;background:var(--ub);border:1px solid var(--ubd);border-radius:var(--r) var(--r) 4px var(--r)}
.msg.bot{align-self:flex-start;background:var(--bb);border:1px solid var(--bbd);border-radius:var(--r) var(--r) var(--r) 4px}
.msg.error{align-self:center;background:rgba(200,80,80,.08);border:1px solid rgba(200,80,80,.2);border-radius:10px;color:#c46;font-size:12px;text-align:center;max-width:88%;padding:8px 14px}
.msg pre{background:var(--bg);border-radius:6px;padding:8px 10px;margin:4px 0;overflow-x:auto;font-size:12.5px;line-height:1.4}
.msg code{font-family:"SF Mono","Menlo",monospace;font-size:12.5px}
.msg p{margin-bottom:4px}.msg p:last-child{margin-bottom:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--td);text-align:center;padding:40px}
.empty-crabs{font-size:48px;letter-spacing:8px;opacity:.6}
.empty-state p{font-size:13px}
.typing{display:none;align-self:flex-start;padding:10px 16px}
.typing.show{display:flex;gap:5px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--td);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.input-bar{flex-shrink:0;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--s1)}
.input-bar textarea{flex:1;resize:none;border:1px solid var(--bd);border-radius:14px;padding:9px 13px;max-height:110px;min-height:40px;background:var(--bg);color:var(--t);font-size:15px;font-family:var(--f);line-height:1.4;outline:none}
.input-bar textarea:focus{border-color:var(--ac)}
.input-bar textarea::placeholder{color:var(--tf)}
.send-btn{width:40px;height:40px;flex-shrink:0;border:none;border-radius:50%;cursor:pointer;background:var(--ac);color:#0c0b0e;display:flex;align-items:center;justify-content:center;transition:.15s}
.send-btn:disabled{opacity:.3;pointer-events:none}
.send-btn:active{transform:scale(.9)}
.send-btn svg{width:18px;height:18px}
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);backdrop-filter:blur(3px)}
.overlay.open{display:flex;align-items:flex-end;justify-content:center}
.panel{width:100%;max-width:500px;max-height:85vh;overflow-y:auto;background:var(--s1);border-radius:14px 14px 0 0;padding:20px 18px 28px;animation:slideUp .2s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}}
.panel h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.panel label{display:block;font-size:12px;color:var(--td);margin-bottom:5px}
.panel input,.panel textarea,.panel select{width:100%;padding:9px 11px;margin-bottom:12px;background:var(--bg);border:1px solid var(--bd);border-radius:9px;color:var(--t);font-size:13.5px;font-family:var(--f);outline:none}
.panel input:focus,.panel textarea:focus{border-color:var(--ac)}
.panel textarea{resize:vertical;min-height:80px;line-height:1.5}
.p-btns{display:flex;gap:8px;margin-top:4px}
.p-btns button{flex:1;padding:10px;border:none;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:var(--f)}
.btn-c{background:var(--bg);color:var(--td)}.btn-s{background:var(--ac);color:#0c0b0e}
.h-btn{background:none;border:1px solid var(--bd);color:var(--td);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:var(--f)}
.mem-item{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.5;position:relative}
.mem-item .mem-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--tf);font-size:16px;cursor:pointer}
.mem-add{width:100%;padding:10px;background:var(--acd);border:1px dashed var(--ac);border-radius:9px;color:var(--ac);font-size:13px;cursor:pointer;text-align:center;font-family:var(--f);margin-bottom:12px}
.sb-overlay{display:none;position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.4)}
.sb-overlay.show{display:block}
@media(max-width:640px){
  .sidebar{position:absolute;z-index:50;height:100%;transform:translateX(-260px)}
  .sidebar.show{transform:translateX(0)}
  .menu-btn{display:block}
}
</style>
</head>
<body>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-header"><h2>🦀🦀 对话</h2><button class="sb-new" onclick="newSession()">+ 新对话</button></div>
    <div class="sb-list" id="sessionList"></div>
    <div class="sb-bottom">
      <button onclick="openPanel('settings')">⚙ 设置</button>
      <button onclick="openPanel('memory')">🧠 记忆</button>
    </div>
  </div>
  <div class="main">
    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>🦀 我们的家</h1>
      </div>
      <input class="model-sel" id="modelSel" type="text" placeholder="模型名称" 
        onchange="saveLocal()" oninput="saveLocal()"
        style="width:160px;border-radius:8px;padding:5px 8px;font-size:11px">
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState"><div class="empty-crabs">🦀 🦀</div><p>两只小螃蟹的家<br>点左上角 ☰ 新建对话</p></div>
    </div>
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="跟宝宝说话…" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="overlay" id="settingsOverlay" onclick="closePO(event,'settingsOverlay')">
<div class="panel">
  <h2>设置 <button class="h-btn" onclick="closeP('settingsOverlay')">关闭</button></h2>
  <label>后端地址</label>
  <input type="text" id="cfgBase" placeholder="https://crab-home-backend.onrender.com">
  <label>API Key（可选，后端已配则留空）</label>
  <input type="password" id="cfgKey" placeholder="留空使用后端配置的Key" autocomplete="off">
  <label>中转站地址（可选）</label>
  <input type="text" id="cfgApiBase" placeholder="留空使用官方地址">
  <label>System Prompt</label>
  <textarea id="cfgPrompt" placeholder="定义AI的人格和行为"></textarea>
  <label>温度 (0-1)</label>
  <input type="number" id="cfgTemp" step="0.1" min="0" max="1" value="0.7">
  <label>上下文保留轮数</label>
  <input type="number" id="cfgRounds" min="1" max="100" value="20">
  <div class="p-btns">
    <button class="btn-c" onclick="closeP('settingsOverlay')">取消</button>
    <button class="btn-s" onclick="saveSettings()">保存</button>
  </div>
</div>
</div>
<div class="overlay" id="memoryOverlay" onclick="closePO(event,'memoryOverlay')">
<div class="panel">
  <h2>记忆库 <button class="h-btn" onclick="closeP('memoryOverlay')">关闭</button></h2>
  <p style="font-size:12px;color:var(--td);margin-bottom:12px;line-height:1.5">自动压缩的对话摘要和手动添加的记忆都在这里，每次对话会自动注入。</p>
  <div id="memList"></div>
  <button class="mem-add" onclick="addMemory()">+ 手动添加记忆</button>
</div>
</div>
<script>
const LOCAL_KEY='crab_home_cfg';
let cfg={base:'',apiKey:'',apiBase:'',model:'claude-sonnet-4-6'};
let currentSession=null,sessions=[],streaming=false;

(function init(){
  try{Object.assign(cfg,JSON.parse(localStorage.getItem(LOCAL_KEY)||'{}'))}catch(e){}
  if(cfg.model){const s=document.getElementById('modelSel');if(s)s.value=cfg.model}
  if(!cfg.base)setTimeout(()=>openPanel('settings'),300);
  else{loadSessions();loadSettingsToUI();refreshModels()}
})();

function saveLocal(){cfg.model=document.getElementById('modelSel').value;localStorage.setItem(LOCAL_KEY,JSON.stringify(cfg))}

async function api(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(cfg.base.replace(/\/+$/,'')+path,opts);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'HTTP '+r.status)}
  return r.json();
}

async function loadSessions(){
  try{sessions=await api('/api/sessions');renderSessions()}catch(e){console.error(e)}
}
function renderSessions(){
  const el=document.getElementById('sessionList');
  if(!sessions.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tf);font-size:12px">还没有对话<br>点上方 + 新建</div>';return}
  el.innerHTML=sessions.map(s=>`<div class="sb-item ${currentSession?.id===s.id?'active':''}" onclick="switchSession(${s.id})"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</span><button class="sb-del" onclick="event.stopPropagation();delSession(${s.id})">×</button></div>`).join('');
}
async function newSession(){
  try{const s=await api('/api/sessions','POST',{name:'新对话'});sessions.unshift(s);await switchSession(s.id)}catch(e){alert('创建失败: '+e.message)}
}
async function switchSession(id){
  currentSession=sessions.find(s=>s.id===id)||{id};renderSessions();toggleSidebar(false);await loadMessages(id);
}
async function delSession(id){
  if(!confirm('删除这个对话？'))return;
  try{await api('/api/sessions/'+id,'DELETE');sessions=sessions.filter(s=>s.id!==id);if(currentSession?.id===id){currentSession=null;document.getElementById('messages').innerHTML='<div class="empty-state"><div class="empty-crabs">🦀 🦀</div><p>选择或新建对话</p></div>'}renderSessions()}catch(e){alert(e.message)}
}

async function loadMessages(sid){
  const el=document.getElementById('messages');
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tf)">加载中...</div>';
  try{
    const msgs=await api('/api/messages/'+sid);
    if(!msgs.length){el.innerHTML='<div class="empty-state"><div class="empty-crabs">🦀 🦀</div><p>开始新的对话吧</p></div>';return}
    let html='',lt='';
    for(const m of msgs){const t=fmtTime(m.created_at);if(t!==lt){html+=`<div class="msg-time">${t}</div>`;lt=t}html+=`<div class="msg ${m.role==='user'?'user':'bot'}">${fmtMd(m.content)}</div>`}
    el.innerHTML=html;scrollEnd();
  }catch(e){el.innerHTML=`<div class="msg error">加载失败: ${e.message}</div>`}
}
function addMsgBubble(role,content){
  const el=document.getElementById('messages');const empty=el.querySelector('.empty-state');if(empty)empty.remove();
  const td=document.createElement('div');td.className='msg-time';td.textContent=fmtTime(new Date().toISOString());el.appendChild(td);
  const d=document.createElement('div');d.className=`msg ${role==='user'?'user':(role==='error'?'error':'bot')}`;d.innerHTML=fmtMd(content);el.appendChild(d);scrollEnd();
}
function scrollEnd(){const el=document.getElementById('messages');requestAnimationFrame(()=>el.scrollTop=el.scrollHeight)}

const input=document.getElementById('input'),sendBtn=document.getElementById('sendBtn');
input.addEventListener('input',()=>{sendBtn.disabled=!input.value.trim()||streaming||!currentSession});
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}

async function send(){
  const text=input.value.trim();if(!text||streaming||!currentSession)return;if(!cfg.base){openPanel('settings');return}
  input.value='';input.style.height='auto';sendBtn.disabled=true;addMsgBubble('user',text);
  streaming=true;document.getElementById('typing').classList.add('show');scrollEnd();
  try{
    const body={session_id:currentSession.id,content:text,model:document.getElementById('modelSel').value};
    if(cfg.apiKey)body.api_key=cfg.apiKey;if(cfg.apiBase)body.api_base=cfg.apiBase;
    const data=await api('/api/chat','POST',body);addMsgBubble('assistant',data.content);
  }catch(e){addMsgBubble('error','⚠ '+e.message)}
  finally{document.getElementById('typing').classList.remove('show');streaming=false;sendBtn.disabled=!input.value.trim()}
}

async function loadSettingsToUI(){
  try{const s=await api('/api/settings');document.getElementById('cfgPrompt').value=s.system_prompt||'';document.getElementById('cfgTemp').value=s.temperature??0.7;document.getElementById('cfgRounds').value=s.max_context_rounds??20}catch(e){}
  document.getElementById('cfgBase').value=cfg.base||'';document.getElementById('cfgKey').value=cfg.apiKey||'';document.getElementById('cfgApiBase').value=cfg.apiBase||'';
}
async function saveSettings(){
  cfg.base=document.getElementById('cfgBase').value.trim();cfg.apiKey=document.getElementById('cfgKey').value.trim();cfg.apiBase=document.getElementById('cfgApiBase').value.trim();saveLocal();
  try{await api('/api/settings','PUT',{system_prompt:document.getElementById('cfgPrompt').value.trim(),temperature:parseFloat(document.getElementById('cfgTemp').value)||0.7,max_context_rounds:parseInt(document.getElementById('cfgRounds').value)||20})}catch(e){console.error(e)}
  closeP('settingsOverlay');loadSessions();refreshModels();
}

async function refreshModels(){
  const sel=document.getElementById('modelSel');
  const prev=sel.value||cfg.model||'claude-sonnet-4-6';
  try{
    const body={};
    if(cfg.apiKey)body.api_key=cfg.apiKey;
    if(cfg.apiBase)body.api_base=cfg.apiBase;
    const models=await api('/api/models','POST',body);
    if(models.length){
      sel.innerHTML=models.map(m=>`<option value="${esc(m.id)}">${esc(m.id)}</option>`).join('');
      // 恢复之前选的
      const exists=[...sel.options].some(o=>o.value===prev);
      sel.value=exists?prev:models[0].id;
      saveLocal();
    }
  }catch(e){
    console.log('拉取模型列表失败，使用默认:',e.message);
    if(sel.options.length<=1){
      sel.innerHTML='<option value="claude-sonnet-4-6">Sonnet 4.6</option><option value="claude-opus-4-6">Opus 4.6</option><option value="claude-haiku-4-5-20251001">Haiku 4.5</option>';
      sel.value=prev;
    }
  }
}

async function loadMemories(){
  const el=document.getElementById('memList');
  try{const mems=await api('/api/memories');if(!mems.length){el.innerHTML='<p style="color:var(--tf);font-size:12px;margin-bottom:10px">还没有记忆</p>';return}
  el.innerHTML=mems.map(m=>`<div class="mem-item"><button class="mem-del" onclick="delMemory(${m.id})">×</button><div style="font-size:10px;color:var(--tf);margin-bottom:4px">${fmtTime(m.created_at)}</div>${esc(m.summary)}</div>`).join('')}catch(e){el.innerHTML=`<p style="color:#c46;font-size:12px">${e.message}</p>`}
}
async function addMemory(){const t=prompt('输入要添加的记忆：');if(!t?.trim())return;try{await api('/api/memories','POST',{summary:t.trim()});loadMemories()}catch(e){alert(e.message)}}
async function delMemory(id){if(!confirm('删除这条记忆？'))return;try{await api('/api/memories/'+id,'DELETE');loadMemories()}catch(e){alert(e.message)}}

function openPanel(n){if(n==='settings'){loadSettingsToUI();document.getElementById('settingsOverlay').classList.add('open')}else if(n==='memory'){loadMemories();document.getElementById('memoryOverlay').classList.add('open')}}
function closeP(id){document.getElementById(id).classList.remove('open')}
function closePO(e,id){if(e.target===e.currentTarget)closeP(id)}
function toggleSidebar(f){const sb=document.getElementById('sidebar'),ov=document.getElementById('sbOverlay');const show=f!==undefined?f:!sb.classList.contains('show');sb.classList.toggle('show',show);ov.classList.toggle('show',show)}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtMd(t){if(!t)return'';let s=esc(t).replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');return s.split(/\n{2,}/).map(p=>p.startsWith('<pre>')?p:`<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),pad=n=>String(n).padStart(2,'0'),time=`${pad(d.getHours())}:${pad(d.getMinutes())}`;if(d.toDateString()===now.toDateString())return time;return`${pad(d.getMonth()+1)}-${pad(d.getDate())} ${time}`}
</script>
</body>
</html>
