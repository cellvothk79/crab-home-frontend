<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦀 我们的家</title>
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#0c0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sb-overlay" id="sbOverlay" onclick="hideSb()"></div>
<div class="app">
  <div class="sb" id="sb">
    <div class="sb-hdr">
      <div class="sb-hdr-top">
        <span class="sb-title">🦀🦀 我们的家</span>
      </div>
      <div class="sb-time" id="sbTime"></div>
    </div>
    <div class="sb-bot">
      <button class="sb-btn" onclick="openPanel('memory')">记忆</button>
      <button class="sb-btn" onclick="openPanel('favs')">收藏</button>
      <button class="sb-btn" onclick="openPanel('diary')">日记</button>
      <button class="sb-btn" onclick="openPanel('calls')">通话</button>
      <button class="sb-btn" onclick="openPanel('media')">书影音</button>
      <button class="sb-btn" onclick="openPanel('searchChat')">搜聊天</button>
      <button class="sb-btn" onclick="openPanel('monitor')">监控</button>
      <button class="sb-btn" onclick="openPanel('desire')" style="color:var(--ac); border-color:var(--acb); background:var(--acl)">状态</button>
      <button class="sb-btn" onclick="openPanel('settings')">设置</button>
    </div>
  </div>
  <div class="main">
    <div class="hdr">
      <div class="hdr-l">
        <button class="menu-btn" onclick="toggleSb()">☰</button>
        <div style="display:flex;flex-direction:column;gap:1px">
          <span class="hdr-title">🦀 我们的家</span>
          <span id="headerMood" onclick="refreshHeaderMood()" style="font-size:10px;color:var(--ac);cursor:pointer;opacity:.8;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="点击换一条">💭 此刻状态</span>
        </div>
      </div>
      <button class="preset-btn" id="presetBtn" onclick="openPanel('preset')">加载中...</button>
      <button class="ic-btn normal" onclick="startCall()" id="callBtn" title="打电话" style="margin-left:6px">📞</button>
    </div>
    <div id="selBar" class="sel-bar" style="display:none">
      <span id="selCount">已选 0 条</span>
      <div style="display:flex;gap:6px">
        <button class="h-btn" style="color:var(--ac)" onclick="collectGroup()">打包收藏</button>
        <button class="h-btn" style="color:#c46" onclick="deleteSelected()">删除</button>
        <button class="h-btn" onclick="cancelSel()">取消</button>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty" id="emptyState">
        <div class="empty-crabs">🦀 🦀</div>
        <div style="font-size:11px">两只小螃蟹的家<br>新建对话开始聊天</div>
      </div>
    </div>
    <div id="quoteBanner" class="banner" style="display:none">
      <span id="quoteText" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.8"></span>
      <button class="banner-x" onclick="clearQuote()">×</button>
    </div>
    <div id="editBanner" class="banner" style="display:none">
      <span>✏ 编辑消息中</span>
      <button class="banner-x" onclick="cancelEdit()">取消</button>
    </div>
    <div id="linkRow" class="link-row" style="display:none">
      <input id="linkInput" style="flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t);font-size:13px;outline:none" placeholder="粘贴链接..." onkeydown="if(event.key==='Enter')sendLink();if(event.key==='Escape')toggleLink()">
      <button onclick="sendLink()" style="padding:7px 10px;background:var(--ac);border:none;border-radius:8px;color:#0c0b0e;font-size:12.5px;cursor:pointer">发送</button>
      <button onclick="toggleLink()" style="padding:7px 8px;background:none;border:1px solid var(--bd);border-radius:8px;color:var(--td);font-size:12.5px;cursor:pointer">✕</button>
    </div>
    <div class="staged-area" id="stagedArea"></div>
     <div id="stickerPicker" style="display:none; position:absolute; bottom:100%; left:10px; right:10px; background:var(--s2); border:1px solid var(--bd); border-radius:12px; padding:10px; margin-bottom:10px; max-height:200px; overflow-y:auto; box-shadow:0 -4px 20px rgba(0,0,0,0.5); z-index:100;">
       <div id="stickerGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(60px, 1fr)); gap:10px;"></div>
    </div>
    <!-- 👇 新增的微信级折叠面板 (默认隐藏) -->
    <div id="expandPanel" style="display:none; background:var(--s1); border-top:1px solid var(--bd); padding:20px; padding-bottom:max(20px, env(safe-area-inset-bottom)); flex-shrink:0;">
       <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:15px;">
           <div onclick="document.getElementById('fileInput').click(); toggleExpandPanel();" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
               <div style="width:54px;height:54px;border-radius:16px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bd);margin-bottom:8px;transition:0.1s;" onmousedown="this.style.background='var(--bd)'" onmouseup="this.style.background='var(--s2)'">🖼️</div>
               <span style="font-size:11px;color:var(--td)">发相册</span>
           </div>
           <div onclick="toggleStickerPicker(); toggleExpandPanel();" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
               <div style="width:54px;height:54px;border-radius:16px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bd);margin-bottom:8px;transition:0.1s;" onmousedown="this.style.background='var(--bd)'" onmouseup="this.style.background='var(--s2)'">🤡</div>
               <span style="font-size:11px;color:var(--td)">表情包</span>
           </div>
           <div onclick="openMusicSearch(); toggleExpandPanel();" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
               <div style="width:54px;height:54px;border-radius:16px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bd);margin-bottom:8px;transition:0.1s;" onmousedown="this.style.background='var(--bd)'" onmouseup="this.style.background='var(--s2)'">🎵</div>
               <span style="font-size:11px;color:var(--td)">一起听</span>
           </div>
           <div onclick="openDrawingBoard(); toggleExpandPanel();" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
               <div style="width:54px;height:54px;border-radius:16px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bd);margin-bottom:8px;transition:0.1s;" onmousedown="this.style.background='var(--bd)'" onmouseup="this.style.background='var(--s2)'">🖌️</div>
               <span style="font-size:11px;color:var(--td)">你画我猜</span>
           </div>
          <div onclick="elbowStrike(); toggleExpandPanel();" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
               <div style="width:54px;height:54px;border-radius:16px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(244,67,54,0.5);margin-bottom:8px;transition:0.1s;" onmousedown="this.style.background='var(--bd)'" onmouseup="this.style.background='var(--s2)'">🥊</div>
               <span style="font-size:11px;color:#f44336">肘击他</span>
           </div>
       </div>
    </div>

    <!-- 👇 极简回归的输入栏 -->
    <div class="input-bar" style="position:relative">
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="sendImage(event)">
      
      <!-- 魔法加号按钮 -->
      <button class="ic-btn normal" id="btnExpand" onclick="toggleExpandPanel()" title="更多功能" style="font-size:18px;">⊕</button>
      
      <button class="ic-btn normal" id="voiceRecBtn" onclick="toggleVoiceRec()" title="按住录音">🎙</button>
      
      <!-- 点击输入框自动收起面板 -->
      <textarea class="ta" id="msgInput" placeholder="回车暂存，发送键发出…" rows="1" oninput="onInput(this)" onkeydown="handleKey(event)" onfocus="if(document.getElementById('expandPanel').style.display==='block') toggleExpandPanel()"></textarea>
      
      <button class="send-btn off" id="sendBtn" onclick="send()">↑</button>
    </div>

  </div>
</div>

<!-- Panels -->
<div class="overlay" id="overlay" onclick="closePanel()" style="display:none">
<div class="panel" onclick="event.stopPropagation()" id="panelContent"></div>
</div>

<!-- 通话悬浮小窗 -->
<div id="callWindow" style="display:none;position:fixed;z-index:500;bottom:100px;right:16px;width:190px;background:var(--s2);border:1px solid rgba(212,165,116,.4);border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.4);cursor:move;user-select:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:12px;color:var(--ac);font-weight:500">🦀 通话中</span>
    <span id="callTimer" style="font-size:11px;color:var(--td)">00:00</span>
  </div>
  <div id="callStatus" style="font-size:12px;color:var(--td);text-align:center;min-height:20px;margin-bottom:12px">等待中...</div>
  <div id="callWave" style="height:32px;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:12px">
    <div class="cwave" style="width:3px;height:4px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:6px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:10px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:14px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:10px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:6px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:4px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
  </div>
  <div style="display:flex;justify-content:center">
    <button onclick="endCall()" style="background:#c46;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer">📵</button>
  </div>
</div>

<!-- 来电等待弹窗（你打给他，等他接） -->
<div id="incomingCall" style="display:none;position:fixed;z-index:600;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--s2);border:1px solid rgba(212,165,116,.4);border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:200px">
  <div style="font-size:40px;margin-bottom:10px;animation:pulse 1s infinite">🦀</div>
  <div style="font-size:14px;font-weight:500;margin-bottom:6px">正在呼叫...</div>
  <div id="ringStatus" style="font-size:12px;color:var(--td);margin-bottom:20px">等待接听</div>
  <button onclick="rejectCall()" style="background:rgba(196,70,70,.2);border:1px solid #c46;border-radius:20px;color:#c46;font-size:12px;padding:7px 20px;cursor:pointer">取消</button>
</div>

<!-- 录音弹窗 -->
<div id="voiceOverlay" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center;padding-bottom:40px">
  <div style="background:var(--s2);border:1px solid rgba(212,165,116,.3);border-radius:20px;padding:24px 32px;text-align:center;min-width:240px">
    <div id="voiceStatus" style="font-size:13px;color:var(--ac);margin-bottom:16px">按住说话</div>
    <div id="voiceWave" style="height:40px;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px">
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:8px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:16px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:24px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:32px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:24px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:16px;opacity:.4"></div>
      <div class="wave-bar" style="width:3px;background:var(--ac);border-radius:2px;height:8px;opacity:.4"></div>
    </div>
    <button id="voiceRecordBtn" 
      ontouchstart="startVoiceRec(event)" ontouchend="stopVoiceRec(event)"
      onmousedown="startVoiceRec(event)" onmouseup="stopVoiceRec(event)" onmouseleave="stopVoiceRec(event)"
      style="width:64px;height:64px;border-radius:50%;background:var(--ac);border:none;font-size:28px;cursor:pointer;color:#000">🎙</button>
    <div style="margin-top:12px;font-size:11px;color:var(--td)">松开发送 · <span onclick="cancelVoiceRec()" style="color:#c46;cursor:pointer">取消</span></div>
  </div>
</div>
<div class="ctx" id="ctxMenu" style="display:none">
  <button class="ctx-item" id="ctxEdit" style="color:var(--t)" onclick="ctxAct('edit')">✏ 重新编辑</button>
  <button class="ctx-item" style="color:var(--t)" onclick="ctxAct('quote')">💬 引用</button>
  <button class="ctx-item" style="color:var(--t)" onclick="ctxAct('copy')">📋 复制</button>
  <button class="ctx-item" id="ctxInner" style="color:var(--ac)" onclick="ctxAct('inner')">💭 心声</button>
  <button class="ctx-item" style="color:var(--t)" onclick="ctxAct('collect')">⭐ 单条收藏</button>
  <button class="ctx-item" style="color:var(--t)" onclick="ctxAct('select')">☑ 多选收藏</button>
  <button class="ctx-item" style="color:#c46" onclick="ctxAct('delete')">🗑 删除</button>
</div>

<!-- 心声弹窗 -->
<div id="innerPopup" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);align-items:center;justify-content:center">
  <div style="background:var(--s2);border:1px solid rgba(212,165,116,.3);border-radius:14px;padding:18px 16px;max-width:280px;width:90%;position:relative">
    <div style="font-size:11px;color:var(--ac);margin-bottom:10px">💭 此刻心声</div>
    <div id="innerPopupText" style="font-size:13.5px;line-height:1.7;color:var(--t);font-style:italic;min-height:40px"></div>
    <button onclick="document.getElementById('innerPopup').style.display='none'" style="margin-top:14px;width:100%;padding:8px;background:var(--acl);border:1px solid var(--acb);border-radius:8px;color:var(--ac);font-size:13px;cursor:pointer">关闭</button>
  </div>
</div>

<!-- Anniv alert -->
<div id="annivAlert" class="anniv-alert" style="display:none">
  <span id="annivText"></span>
  <button onclick="document.getElementById('annivAlert').style.display='none'" style="background:none;border:none;color:var(--tf);cursor:pointer;font-size:13px">×</button>
</div>
<script src="./call.js"></script>
<script src="./app.js"></script>
<!-- 音乐组件 -->
<div class="music-widget" id="musicWidget">
  <div class="vinyl-record" id="vinylRecord"><img id="vinylCover" src=""></div>
  <div class="music-info">
    <div class="music-name" id="mTrackName">准备中...</div>
    <div class="music-artist" id="mArtistName"></div>
  </div>
  <button style="background:none;border:none;color:var(--t);font-size:16px;cursor:pointer" onclick="closeMusic()">×</button>
</div>

<!-- 画板组件 -->
<div id="drawingBoard">
  <div class="canvas-tools">
     <div class="color-btn active" style="background:#000" onclick="setBrush('#000', this)"></div>
     <div class="color-btn" style="background:#f44336" onclick="setBrush('#f44336', this)"></div>
     <div class="color-btn" style="background:#4caf50" onclick="setBrush('#4caf50', this)"></div>
     <div class="color-btn" style="background:#2196f3" onclick="setBrush('#2196f3', this)"></div>
     <input type="range" id="brushSize" min="1" max="20" value="3" style="width:80px">
     <button class="h-btn" onclick="clearCanvas()">清空</button>
  </div>
  <div class="canvas-container"><canvas id="dCanvas" width="320" height="400"></canvas></div>
  <div style="display:flex; gap:20px; margin-top:20px;">
     <button class="p-btn save" style="width:120px" onclick="sendDrawing()">发送给他</button>
     <button class="h-btn" style="width:120px; background:var(--s2)" onclick="document.getElementById('drawingBoard').style.display='none'">取消</button>
  </div>
</div>

</body>
</html>
