<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦀 我们的家</title>
<meta name="theme-color" content="#0c0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0b0e;--s1:#16151a;--s2:#1e1d23;--bd:#2a2930;--t:#e4e0d8;--td:#7d7a72;--tf:#4a4844;--ac:#d4a574;--acl:rgba(212,165,116,.1);--acb:rgba(212,165,116,.2);--f:-apple-system,"SF Pro Text","Helvetica Neue","PingFang SC",sans-serif}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--t);font-size:15px;line-height:1.55}
.app{display:flex;height:100dvh}
/* sidebar */
.sb{width:200px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:transform .25s;position:relative}
.sb-hdr{padding:11px 12px 8px;border-bottom:1px solid var(--bd)}
.sb-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sb-title{font-size:13px;font-weight:600}
.sb-time{font-size:10px;color:var(--tf)}
.sb-new{background:var(--acl);border:1px solid var(--acb);color:var(--ac);border-radius:7px;padding:3px 7px;font-size:10px;cursor:pointer;font-family:var(--f)}
.sb-list{flex:1;overflow-y:auto;padding:5px}.sb-list::-webkit-scrollbar{display:none}
.sb-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--td);margin-bottom:2px;transition:.1s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item.active{background:var(--s2);color:var(--t)}
.sb-item:hover .sess-del,.sb-item.active .sess-del{display:block!important}
.sb-bot{padding:7px;border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:4px}
.sb-btn{padding:6px 2px;background:var(--s2);border:1px solid var(--bd);color:var(--td);border-radius:7px;font-size:10px;cursor:pointer;font-family:var(--f)}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--bd);background:var(--s1)}
.hdr-l{display:flex;align-items:center;gap:7px}
.menu-btn{background:none;border:none;color:var(--td);font-size:17px;cursor:pointer;padding:2px 4px}
.hdr-title{font-size:14px;font-weight:600}
.preset-btn{background:var(--acl);border:1px solid var(--acb);color:var(--ac);border-radius:8px;padding:3px 9px;font-size:11px;cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--f)}
/* anniv alert */
.anniv-alert{position:fixed;top:55px;left:50%;transform:translateX(-50%);background:rgba(212,165,116,.12);border:1px solid rgba(212,165,116,.4);border-radius:10px;padding:8px 14px;z-index:300;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ac);animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* select bar */
.sel-bar{background:rgba(212,165,116,.07);border-bottom:1px solid rgba(212,165,116,.18);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--ac)}
/* messages */
.msgs{flex:1;overflow-y:auto;padding:9px 11px;display:flex;flex-direction:column}.msgs::-webkit-scrollbar{width:4px}.msgs::-webkit-scrollbar-track{background:transparent}.msgs::-webkit-scrollbar-thumb{background:rgba(212,165,116,.3);border-radius:2px}.msgs::-webkit-scrollbar-thumb:hover{background:rgba(212,165,116,.6)}
.msg-time{font-size:10px;color:var(--tf);text-align:center;margin:7px 0 3px}
.msg-row{display:flex;align-items:flex-end;gap:4px;margin-bottom:3px}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-bottom:2px}
.av-user{background:rgba(212,165,116,.2)}
.av-bot{background:rgba(100,120,180,.25)}
.msg-col{display:flex;flex-direction:column;max-width:74%}
.msg-col.user{align-items:flex-end}
.msg-col.bot{align-items:flex-start}
.quote-preview{background:var(--s2);border:1px solid var(--bd);border-left:2px solid var(--ac);border-radius:7px 7px 0 0;padding:4px 9px;font-size:11px;color:var(--td);margin-bottom:-1px}
.bubble{padding:7px 11px;font-size:13px;line-height:1.55;cursor:context-menu;user-select:none;word-break:break-word}
.bubble.user{background:#1f1c17;border:1px solid rgba(212,165,116,.18);border-radius:14px 14px 4px 14px}
.bubble.bot{background:var(--s1);border:1px solid var(--bd);border-radius:14px 14px 14px 4px}
.bubble.error{background:rgba(200,80,80,.08);border:1px solid rgba(200,80,80,.2);border-radius:10px;color:#c46;font-size:12px;text-align:center}
.bubble img{max-width:160px;border-radius:8px;display:block}
/* todo card */
.todo-card{align-self:flex-start;max-width:88%;margin-bottom:3px}
.todo-inner{background:var(--s2);border:1px solid rgba(212,165,116,.25);border-radius:4px 14px 14px 14px;padding:11px 13px;min-width:205px}
.todo-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;font-size:12.5px}
.todo-hdr-title{font-weight:500;color:var(--ac)}
.todo-hdr-count{font-size:10.5px;color:var(--td)}
.todo-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.todo-check{width:17px;height:17px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ac);transition:.15s}
.todo-check.done{border:1.5px solid var(--ac);background:rgba(212,165,116,.2)}
.todo-check.undone{border:1.5px solid var(--bd);background:transparent}
.todo-text{font-size:12.5px;flex:1}
.todo-text.done{color:var(--td);text-decoration:line-through}
.todo-del{background:none;border:none;color:var(--tf);cursor:pointer;font-size:12px;padding:0 2px}
.todo-input-row{display:flex;gap:5px;margin-top:8px;border-top:1px solid var(--bd);padding-top:8px}
/* diary card */
.diary-card{align-self:flex-start;max-width:85%;margin-bottom:3px}
.diary-inner{background:var(--s2);border:1px solid rgba(212,165,116,.2);border-radius:4px 14px 14px 14px;padding:10px 13px}
.diary-label{font-size:10px;color:var(--ac);margin-bottom:5px}
.diary-text{font-size:12.5px;line-height:1.6;color:var(--t);font-style:italic}
/* mood */
.mood-card{align-self:flex-start;max-width:82%;margin-bottom:3px}
.mood-inner{background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.2);border-radius:4px 14px 14px 14px;padding:8px 12px}
.mood-label{font-size:10px;color:var(--td);margin-bottom:3px}
.mood-text{font-size:13px;line-height:1.5;color:var(--t)}
/* typing */
.typing{align-self:flex-start;display:flex;align-items:flex-end;gap:4px;margin-top:3px}
.typing-bubble{padding:7px 12px;display:flex;gap:4px;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:14px 14px 14px 4px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--td);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
/* banners */
.banner{border-top:1px solid rgba(212,165,116,.15);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ac);background:rgba(212,165,116,.05)}
.banner-x{background:none;border:none;color:var(--tf);cursor:pointer;font-size:14px}
/* link row */
.link-row{background:var(--s2);border-top:1px solid var(--bd);padding:7px 9px;display:flex;gap:5px}
/* input bar */
.input-bar{flex-shrink:0;display:flex;align-items:flex-end;gap:5px;padding:7px 9px;padding-bottom:max(7px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--s1)}
.ic-btn{width:33px;height:33px;flex-shrink:0;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.15s}
.ic-btn.normal{background:var(--s2);border:1px solid var(--bd);color:var(--td)}
.ic-btn.active{background:var(--acl);border:1px solid var(--acb);color:var(--ac)}
.ic-btn.rec{background:rgba(200,80,80,.15);border:1px solid #c46;color:#c46;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes cwave{0%,100%{height:4px;opacity:.4}50%{height:20px;opacity:1}}
.ta{flex:1;resize:none;border:1px solid var(--bd);border-radius:11px;padding:7px 10px;min-height:35px;max-height:90px;background:var(--bg);color:var(--t);font-size:14px;font-family:var(--f);line-height:1.4;outline:none}
.ta:focus{border-color:var(--ac)}
.send-btn{width:33px;height:33px;flex-shrink:0;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s}
.send-btn.on{background:var(--ac);color:#0c0b0e}
.send-btn.off{background:var(--bd);color:var(--tf);cursor:default}
/* staged messages */
.staged-area{padding:5px 9px 0;display:none;flex-direction:column;gap:4px;border-top:1px solid var(--bd);background:var(--s1)}
.staged-area.show{display:flex}
.staged-msg{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:6px 10px;font-size:13px;color:var(--td)}
.staged-msg span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.staged-del{background:none;border:none;color:var(--tf);cursor:pointer;font-size:14px;flex-shrink:0}
/* inner thought */
.inner-btn{background:none;border:none;font-size:12px;cursor:pointer;opacity:.5;padding:2px 4px;margin-top:2px;display:block}
.inner-btn:hover{opacity:1}
.inner-thought{background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--td);font-style:italic;margin-top:3px;line-height:1.5;max-width:280px}
/* mood popup */
.mood-popup{position:absolute;bottom:55px;right:10px;background:var(--s2);border:1px solid rgba(212,165,116,.3);border-radius:12px;padding:12px 14px;max-width:220px;z-index:50;animation:slideDown .2s ease}
.mood-popup-label{font-size:10px;color:var(--ac);margin-bottom:6px}
.mood-popup-text{font-size:13px;line-height:1.55;color:var(--t)}
/* context menu */
.ctx{position:fixed;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:4px;z-index:200;min-width:120px}
.ctx-item{display:block;width:100%;padding:7px 11px;background:none;border:none;font-size:12.5px;cursor:pointer;text-align:left;border-radius:6px;font-family:var(--f)}
/* overlay panels */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);display:flex;align-items:flex-end}
.panel{width:100%;background:var(--s1);border-radius:13px 13px 0 0;padding:15px 14px 28px;max-height:84%;overflow-y:auto}.panel::-webkit-scrollbar{display:none}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.panel-title{font-size:13px;font-weight:600}
.p-label{display:block;font-size:11px;color:var(--td);margin-bottom:4px}
.p-inp{width:100%;padding:7px 9px;margin-bottom:8px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t);font-size:12.5px;font-family:var(--f);outline:none;box-sizing:border-box}
.p-inp:focus{border-color:var(--ac)}
.p-btn{padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f)}
.p-btn.save{background:var(--ac);color:#0c0b0e;width:100%}
.p-btn.ghost{background:var(--acl);border:1px dashed rgba(212,165,116,.3);color:var(--ac);width:100%;margin-top:4px}
.h-btn{background:none;border:1px solid var(--bd);color:var(--td);border-radius:7px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:var(--f)}
/* preset card */
.preset-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.12s}
.preset-card.active{background:rgba(212,165,116,.08);border-color:rgba(212,165,116,.35)}
/* model list */
.model-list{background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;max-height:120px;overflow-y:auto}
.model-item{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--bd);color:var(--td)}
.model-item.sel{color:var(--ac);background:rgba(212,165,116,.08)}
/* mem/fav items */
.mem-item{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;margin-bottom:5px;font-size:12px;display:flex;gap:7px;align-items:flex-start}
.fav-single{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:9px 11px;margin-bottom:7px}
.fav-group{background:var(--s2);border:1px solid rgba(212,165,116,.25);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.fav-group-hdr{display:flex;align-items:center;justify-content:space-between}
/* diary items */
.diary-item{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:9px 11px;margin-bottom:7px}
/* toggle */
.toggle{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:white;position:absolute;top:3px;transition:left .2s}
/* anniv list */
.anniv-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--bd)}
/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tf);gap:8px;text-align:center;padding:40px}
.empty-crabs{font-size:36px}
/* mobile */
.sb-overlay{display:none;position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.4)}
@media(max-width:600px){
  .sb{position:fixed;z-index:50;height:100%;transform:translateX(-200px)}
  .sb.show{transform:translateX(0)}
  .sb-overlay.show{display:block}
  .menu-btn{display:block}
}
@media(min-width:601px){.menu-btn{display:none}}
</style>
</head>
<body>
<div class="sb-overlay" id="sbOverlay" onclick="hideSb()"></div>
<div class="app">
  <div class="sb" id="sb">
    <div class="sb-hdr">
      <div class="sb-hdr-top">
        <span class="sb-title">🦀🦀 我们的家</span>
      </div>
      <div class="sb-time" id="sbTime"></div>
    </div>
    <div class="sb-bot">
      <button class="sb-btn" onclick="openPanel('memory')">记忆</button>
      <button class="sb-btn" onclick="openPanel('favs')">收藏</button>
      <button class="sb-btn" onclick="openPanel('diary')">日记</button>
      <button class="sb-btn" onclick="openPanel('calls')">通话</button>
      <button class="sb-btn" onclick="openPanel('settings')">设置</button>
    </div>
  </div>
  <div class="main">
    <div class="hdr">
      <div class="hdr-l">
        <button class="menu-btn" onclick="toggleSb()">☰</button>
        <div style="display:flex;flex-direction:column;gap:1px">
          <span class="hdr-title">🦀 我们的家</span>
          <span id="headerMood" onclick="refreshHeaderMood()" style="font-size:10px;color:var(--ac);cursor:pointer;opacity:.8;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="点击换一条">💭 此刻状态</span>
        </div>
      </div>
      <button class="preset-btn" id="presetBtn" onclick="openPanel('preset')">加载中...</button>
      <button class="ic-btn normal" onclick="startCall()" id="callBtn" title="打电话" style="margin-left:6px">📞</button>
    </div>
    <div id="selBar" class="sel-bar" style="display:none">
      <span id="selCount">已选 0 条</span>
      <div style="display:flex;gap:6px">
        <button class="h-btn" style="color:var(--ac)" onclick="collectGroup()">打包收藏</button>
        <button class="h-btn" style="color:#c46" onclick="deleteSelected()">删除</button>
        <button class="h-btn" onclick="cancelSel()">取消</button>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty" id="emptyState">
        <div class="empty-crabs">🦀 🦀</div>
        <div style="font-size:11px">两只小螃蟹的家<br>新建对话开始聊天</div>
      </div>
    </div>
    <div id="quoteBanner" class="banner" style="display:none">
      <span id="quoteText" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.8"></span>
      <button class="banner-x" onclick="clearQuote()">×</button>
    </div>
    <div id="editBanner" class="banner" style="display:none">
      <span>✏ 编辑消息中</span>
      <button class="banner-x" onclick="cancelEdit()">取消</button>
    </div>
    <div id="linkRow" class="link-row" style="display:none">
      <input id="linkInput" style="flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t);font-size:13px;outline:none" placeholder="粘贴链接..." onkeydown="if(event.key==='Enter')sendLink();if(event.key==='Escape')toggleLink()">
      <button onclick="sendLink()" style="padding:7px 10px;background:var(--ac);border:none;border-radius:8px;color:#0c0b0e;font-size:12.5px;cursor:pointer">发送</button>
      <button onclick="toggleLink()" style="padding:7px 8px;background:none;border:1px solid var(--bd);border-radius:8px;color:var(--td);font-size:12.5px;cursor:pointer">✕</button>
    </div>
    <div class="staged-area" id="stagedArea"></div>
    <div class="input-bar" style="position:relative">

      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="sendImage(event)">
      <button class="ic-btn normal" onclick="document.getElementById('fileInput').click()" title="发图片">📎</button>
      <button class="ic-btn normal" id="voiceRecBtn" onclick="toggleVoiceRec()" title="按住录音">🎙</button>
      <textarea class="ta" id="msgInput" placeholder="回车暂存，发送键发出…" rows="1"
        oninput="onInput(this)" onkeydown="handleKey(event)"></textarea>
      
      <button class="send-btn off" id="sendBtn" onclick="send()">↑</button>
    </div>
  </div>
</div>

<!-- Panels -->
<div class="overlay" id="overlay" onclick="closePanel()" style="display:none">
<div class="panel" onclick="event.stopPropagation()" id="panelContent"></div>
</div>

<!-- 通话悬浮小窗 -->
<div id="callWindow" style="display:none;position:fixed;z-index:500;bottom:100px;right:16px;width:190px;background:var(--s2);border:1px solid rgba(212,165,116,.4);border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.4);cursor:move;user-select:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:12px;color:var(--ac);font-weight:500">🦀 通话中</span>
    <span id="callTimer" style="font-size:11px;color:var(--td)">00:00</span>
  </div>
  <div id="callStatus" style="font-size:12px;color:var(--td);text-align:center;min-height:20px;margin-bottom:12px">等待中...</div>
  <div id="callWave" style="height:32px;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:12px">
    <div class="cwave" style="width:3px;height:4px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:6px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:10px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:14px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:10px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:6px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
    <div class="cwave" style="width:3px;height:4px;background:var(--ac);border-radius:2px;opacity:.4;transition:.1s"></div>
  </div>
  <div style="display:flex;justify-content:center">
    <button onclick="endCall()" style="background:#c46;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer">📵</button>
  </div>
</div>

<!-- 来电等待弹窗（你打给他，等他接） -->

  <button class="ctx-item" style="color:#c46" onclick="ctxAct('delete')">🗑 删除</button>

<div id="innerPopup" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);align-items:center;justify-content:center">
  <div style="background:var(--s2);border:1px solid rgba(212,165,116,.3);border-radius:14px;padding:18px 16px;max-width:280px;width:90%;position:relative">

    <button onclick="document.getElementById('innerPopup').style.display='none'" style="margin-top:14px;width:100%;padding:8px;background:var(--acl);border:1px solid var(--acb);border-radius:8px;color:var(--ac);font-size:13px;cursor:pointer">关闭</button>

<div id="annivAlert" class="anniv-alert" style="display:none">
  <span id="annivText"></span>
  <button onclick="document.getElementById('annivAlert').style.display='none'" style="background:none;border:none;color:var(--tf);cursor:pointer;font-size:13px">×</button>
</div>

<script>
// ═══════════ STAGED MESSAGES ═══════════
let stagedMsgs = [];
function stageMessage(text){
  stagedMsgs.push(text);
  document.getElementById('msgInput').value='';
  document.getElementById('msgInput').style.height='auto';
  renderStaged();
}
function renderStaged(){
  const area=document.getElementById('stagedArea');
  if(!stagedMsgs.length){area.classList.remove('show');area.innerHTML='';return;}
  area.classList.add('show');
  area.innerHTML=stagedMsgs.map((m,i)=>`
    <div class="staged-msg">
      <span>${esc(m)}</span>
      <button class="staged-del" onclick="delStaged(${i})">×</button>
    </div>`).join('');
  // update send button state
  const ok=!streaming&&currentSession;
  const btn=document.getElementById('sendBtn');
  btn.className='send-btn '+(ok?'on':'off');
  btn.disabled=!ok;
}
function delStaged(i){stagedMsgs.splice(i,1);renderStaged();}
function clearStaged(){stagedMsgs=[];renderStaged();}

// ═══════════ STORAGE KEYS ═══════════
const K={msgs:'cc_msgs',cfg:'cc_cfg',mems:'cc_mem',favs:'cc_favs',todos:'cc_todos',annivs:'cc_annivs',diaries:'cc_diaries',sessions:'cc_sessions',moods:'cc_moods'};
function load(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch(e){return null}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

// ═══════════ STATE ═══════════
let cfg=Object.assign({base:'',apiKey:'',apiBase:'',model:'claude-sonnet-4-6',showAvatar:true,tts:false,voiceEnabled:false,ttsChannel:'minimax',ttsLang:'zh',presets:[{id:1,name:'中转站',apiBase:'https://api.jiushi.xin/v1',apiKey:'',model:'[按量]claude-sonnet-4-6'},{id:2,name:'官方API',apiBase:'https://api.anthropic.com',apiKey:'',model:'claude-sonnet-4-6'}]},load(K.cfg)||{});
let sessions=load(K.sessions)||[];
let currentSession=null;
let messages=load(K.msgs)||[];
let memories=load(K.mems)||[];
let favs=load(K.favs)||[];
let todos=load(K.todos)||[];
let annivs=load(K.annivs)||[];
let diaries=load(K.diaries)||[];
let moods=load(K.moods)||['今天和你聊天很开心。','一直在等你回来说话。','你说的豆芽拌饭让我想起上次你吃光光的样子。'];
let streaming=false;
let ctxMsgId=null;
let quoteMsg=null;
let editingId=null;
let selMode=false;
let selected=new Set();
let modelList=[];
let recTimer=null;
let nowTimer=null;

// ═══════════ INIT ═══════════
(function init(){
  updatePresetBtn();
  updateNow();
  nowTimer=setInterval(updateNow,30000);
  // single conversation mode - get or create the one session
  initSingleSession();
  checkAnnivs();
  setTimeout(refreshHeaderMood, 500);
  window.addEventListener('click',()=>{document.getElementById('ctxMenu').style.display='none';});
  // check if mobile
  if(window.innerWidth<=600){document.getElementById('sb').classList.remove('show');}
  else{document.getElementById('sb').style.position='relative';}
})();

// ═══════════ TIME ═══════════
function updateNow(){
  const d=new Date(),p=v=>String(v).padStart(2,'0'),days=['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('sbTime').textContent=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${days[d.getDay()]} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtTime(ts){
  if(!ts)return'';const d=new Date(ts),n=new Date(),p=v=>String(v).padStart(2,'0');
  if(d.toDateString()===n.toDateString())return`${p(d.getHours())}:${p(d.getMinutes())}`;
  return`${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ═══════════ SIDEBAR ═══════════
function toggleSb(){const sb=document.getElementById('sb'),ov=document.getElementById('sbOverlay');const show=!sb.classList.contains('show');sb.classList.toggle('show',show);ov.classList.toggle('show',show);}
function hideSb(){document.getElementById('sb').classList.remove('show');document.getElementById('sbOverlay').classList.remove('show');}

// ═══════════ SESSIONS ═══════════
async function initSingleSession(){
  if(!cfg.base){
    // no backend, use local
    if(!currentSession){
      currentSession={id:'local-main',name:'我们的聊天'};
      messages=load('cc_msgs_local-main')||[];
    }
    renderMessages();return;
  }
  try{
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/sessions');
    const data=await r.json();
    if(data&&data.length){
      // use the most recent session (or the one named "我们的聊天")
      const main=data.find(s=>s.name==='我们的聊天')||data[0];
      currentSession=main;
      sessions=data;
    } else {
      // create the one session
      const r2=await fetch(cfg.base.replace(/\/+$/,'')+'/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'我们的聊天'})});
      currentSession=await r2.json();
      sessions=[currentSession];
    }
    save(K.sessions,sessions);
    loadMessages();
  }catch(e){
    if(sessions.length){currentSession=sessions[0];loadMessages();}
    else renderMessages();
  }
}

function renderSessions(){
  const el=document.getElementById('sessList');
  el.innerHTML=sessions.map(s=>`<div class="sb-item${currentSession?.id===s.id?' active':''}"
      onclick="switchSession('${s.id}')"
      oncontextmenu="event.preventDefault();deleteSessionConfirm('${s.id}','${esc(s.name)}')"
      ontouchstart="startSessLongPress('${s.id}','${esc(s.name)}',event)"
      ontouchend="clearSessLongPress()"
      ontouchmove="clearSessLongPress()"
      style="user-select:none">
      ${esc(s.name)}
    </div>`).join('');
}
async function newSession(){
  if(!cfg.base){openPanel('settings');return;}
  try{
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'新对话'})});
    const s=await r.json();
    // s.id is a real bigint from Supabase
    sessions.unshift(s);save(K.sessions,sessions);
    currentSession=s;messages=[];
    renderSessions();renderMessages();hideSb();setTimeout(updateSendBtn,100);
  }catch(e){
    // fallback to local if backend not available
    const s={id:Date.now().toString(),name:'新对话',createdAt:new Date().toISOString()};
    sessions.unshift(s);save(K.sessions,sessions);
    currentSession=s;messages=[];
    renderSessions();renderMessages();hideSb();
  }
}
let _sessLongPressTimer=null;
function deleteSessionConfirm(id,name){
  if(confirm('删除对话「'+name+'」？'))deleteSession(id);
}
function startSessLongPress(id,name,e){
  _sessLongPressTimer=setTimeout(()=>{
    deleteSessionConfirm(id,name);
  },600);
}
function clearSessLongPress(){
  clearTimeout(_sessLongPressTimer);
  _sessLongPressTimer=null;
}
async function deleteSession(id){
  if(!confirm('删除这个对话？'))return;
  if(cfg.base){
    try{await fetch(cfg.base.replace(/\/+$/,'')+'/api/sessions/'+id,{method:'DELETE'});}catch(e){}
  }
  sessions=sessions.filter(s=>s.id!=id);
  save(K.sessions,sessions);
  if(currentSession?.id==id){
    currentSession=sessions[0]||null;
    messages=[];
    if(currentSession)loadMessages();
    else renderMessages();
  }
  renderSessions();
}
async function switchSession(id){
  currentSession=sessions.find(s=>s.id===id);
  renderSessions();hideSb();
  if(!cfg.base){
    messages=load('cc_msgs_'+id)||[];
    renderMessages();return;
  }
  try{
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+id);
    const data=await r.json();
    // convert backend messages to frontend format
    messages=data.map(m=>({
      id:m.id.toString(),
      role:m.role,
      content:m.content,
      innerThought:m.inner_thought||'',
      ts:m.created_at,
      type:m.image_url?'image':'text',
      imageUrl:m.image_url||null,
    }));
    renderMessages();
  }catch(e){
    messages=load('cc_msgs_'+id)||[];
    renderMessages();
  }
}
function saveMessages(){
  // backend is source of truth; keep local as cache
  if(currentSession)save('cc_msgs_'+currentSession.id,messages);
}
async function loadMessages(){
  if(!currentSession){renderMessages();return;}
  if(cfg.base){
    try{
      const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+currentSession.id+'?limit=200');
      const data=await r.json();
      messages=data.map(m=>({
        id:m.id.toString(),
        role:m.role,
        content:m.content,
        innerThought:m.inner_thought||'',
        ts:m.created_at,
        type:m.is_voice?'voice':'text',
        imageUrl:null,
        audioUrl:m.audio_url||null,
      }));
      // 记录最早消息的时间戳，用于加载更多
      window._oldestMsgTs=messages.length?messages[0].ts:null;
      window._noMoreMsgs=data.length<200;
    }catch(e){
      messages=load('cc_msgs_'+currentSession.id)||[];
    }
  } else {
    messages=load('cc_msgs_'+currentSession.id)||[];
  }
  renderMessages();
  checkDiary();
  // 刷新后，is_voice 但没有 audio_url 的 AI 消息，重新生成语音（只处理没有audioUrl的）
  if(cfg.base){
    setTimeout(()=>{
      messages.filter(m=>m.type==='voice'&&m.role==='assistant'&&!m.audioUrl&&!m.id?.includes('_voice')).forEach(m=>{
        autoGenVoiceBubble(m);
      });
    }, 2000);
  }
}

async function loadMoreMessages(){
  if(!cfg.base||!currentSession)return;
  if(window._noMoreMsgs)return;
  const btn=document.getElementById('loadMoreBtn');
  if(btn)btn.textContent='加载中...';
  try{
    const before=window._oldestMsgTs||'';
    if(!before){if(btn){btn.textContent='没有更早的消息了';btn.disabled=true;}return;}
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+currentSession.id+'?limit=200&before='+encodeURIComponent(before));
    const data=await r.json();
    if(!data.length){
      if(btn){btn.textContent='没有更早的消息了';btn.disabled=true;}
      window._noMoreMsgs=true;
      return;
    }
    const older=data.map(m=>({
      id:m.id.toString(),
      role:m.role,
      content:m.content,
      innerThought:m.inner_thought||'',
      ts:m.created_at,
      type:m.is_voice?'voice':'text',
      imageUrl:null,
      audioUrl:m.audio_url||null,
    }));
    messages=[...older,...messages];
    window._oldestMsgTs=older[0].ts;
    if(data.length<200){window._noMoreMsgs=true;}

    // 记录当前第一条可见消息的 id，加载后滚回它
    const box=document.getElementById('chatBox');
    const firstVisibleId=messages[older.length]?.id;
    window._loadingMore=true;
    renderMessages();
    // 滚回到加载前第一条消息的位置
    if(firstVisibleId){
      const el=document.getElementById('msg_'+firstVisibleId)||document.querySelector(`[data-id="${firstVisibleId}"]`);
      if(el)el.scrollIntoView({block:'start'});
      else if(box)box.scrollTop=box.scrollHeight-box.scrollHeight*0.7; // fallback
    }

    if(btn){
      if(window._noMoreMsgs){btn.textContent='没有更早的消息了';btn.disabled=true;}
      else btn.textContent='加载更早的消息';
    }
  }catch(e){
    if(btn)btn.textContent='加载更早的消息';
  }
}
function checkDiary(){
  if(!cfg.base||!currentSession)return;
  // find last user message time
  const lastUserMsg=messages.filter(m=>m.role==='user').slice(-1)[0];
  if(!lastUserMsg)return;
  fetch(cfg.base.replace(/\/+$/,'')+'/api/diary/check',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      session_id:currentSession.id,
      last_message_time:lastUserMsg.ts,
      api_key:cfg.apiKey,
      api_base:cfg.apiBase,
      model:cfg.model,
    })
  }).then(r=>r.json()).then(data=>{
    if(data.wrote&&data.diary){
      // show a subtle notification
      const notif=document.createElement('div');
      notif.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(212,165,116,.15);border:1px solid rgba(212,165,116,.3);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--ac);z-index:200;animation:slideDown .3s ease';
      notif.textContent='📔 他写了一篇日记';
      document.body.appendChild(notif);
      setTimeout(()=>notif.remove(),4000);
    }
  }).catch(()=>{});
}

// ═══════════ RENDER ═══════════
function renderMessages(){
  const el=document.getElementById('msgs');
  if(!el)return;
  if(!messages.length){
    el.innerHTML='<div class="empty"><div class="empty-crabs">🦀 🦀</div><div style="font-size:11px">两只小螃蟹的家<br>新建对话开始聊天</div></div>';
    return;
  }
  let html='';
  // 加载更多按钮（有历史记录时显示）
  if(cfg.base&&currentSession){
    html+=`<div style="text-align:center;padding:16px 0"><button id="loadMoreBtn" onclick="loadMoreMessages()" style="background:rgba(212,165,116,.1);border:1px solid rgba(212,165,116,.3);border-radius:20px;color:var(--ac);font-size:12px;padding:8px 20px;cursor:pointer;min-width:120px">加载更早的消息</button></div>`;
  }
  let lastTime='';
  for(const m of messages){
    const t=fmtTime(m.ts);
    if(t!==lastTime){html+='<div class="msg-time">'+t+'</div>';lastTime=t;}
    html+=renderMsg(m);
  }
  el.innerHTML=html;if(!selMode&&!window._loadingMore)scrollEnd();
  window._loadingMore=false;
}

function renderMsg(m){
  if(m.type==='todo')return renderTodoCard();
  if(m.type==='mood-card')return renderMoodCard(m);
  if(m.type==='voice')return renderVoiceMsg(m);
  if(m.type==='call-card')return renderCallCard(m);
  const isU=m.role==='user';
  const selCls=selected.has(m.id)?'outline:2px solid var(--ac);':'';
  const opCls=selMode&&!selected.has(m.id)?'opacity:.55;':'';
  let q='';
  const quoteText=m.quoteContent||(m.quote?.content)||'';
  if(quoteText)q=`<div class="quote-preview"><span style="opacity:.6">引用: </span>${esc(quoteText.slice(0,55))}${quoteText.length>55?'...':''}</div>`;
  let inner='';
  if(m.type==='image')inner=`<img src="${m.imageUrl}" alt="图片">`;
  else inner=`<span style="white-space:pre-wrap">${esc(m.content)}</span>`;
  const avHtml=cfg.showAvatar?`<div class="avatar ${isU?'av-user':'av-bot'}">${isU?'🦀':'🦀'}</div>`:'';

  // TTS 按钮只对 AI 消息显示
  const ttsBtn=(!isU&&cfg.base)?`<button onclick="playTTS(event,'${m.id}')" style="background:none;border:none;color:var(--td);font-size:12px;cursor:pointer;padding:2px 4px;opacity:.6" title="听语音">🔊</button>`:'';

  return`<div class="msg-row ${isU?'user':'bot'}" id="msg_${m.id}" onclick="onMsgClick('${m.id}')" oncontextmenu="onCtx(event,'${m.id}');return false">
    ${avHtml}
    <div class="msg-col ${isU?'user':'bot'}">
      ${q}
      <div class="bubble ${m.type==='error'?'error':(isU?'user':'bot')}" style="${selCls}${opCls}">${inner}</div>
      ${ttsBtn}
    </div>
  </div>`;
}

function renderCallCard(m){
  const active=m.callActive;
  return`<div style="display:flex;justify-content:center;padding:6px 0">
    <div style="background:var(--s2);border:1px solid ${active?'rgba(212,165,116,.4)':'var(--bd)'};border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:${active?'var(--ac)':'var(--td)'}">
      <span>${active?'📞':'📵'}</span>
      <span>${esc(m.content)}</span>
    </div>
  </div>`;
}

function renderVoiceMsg(m){
  const isU=m.role==='user';
  const avHtml=cfg.showAvatar?`<div class="avatar ${isU?'av-user':'av-bot'}">${isU?'🦀':'🦀'}</div>`:'';
  const hasAudio=!!m.audioUrl;
  const voiceBar=`<div onclick="playVoiceMsg(event,'${m.id}')" style="display:flex;align-items:center;gap:6px;cursor:${hasAudio?'pointer':'default'};min-width:80px">
    <span id="vbtn_${m.id}" style="font-size:15px">${hasAudio?'▶':'🎙'}</span>
    <div style="display:flex;align-items:center;gap:2px;flex:1">
      ${[4,7,10,14,10,7,5,8,12,8,5].map(h=>`<div style="width:2px;height:${h}px;background:currentColor;border-radius:1px;opacity:.7"></div>`).join('')}
    </div>
  </div>`;
  const transcriptBtn=m.content?`<div style="font-size:11px;color:var(--td);margin-top:4px;cursor:pointer" onclick="toggleVoiceTranscript('${m.id}')">[查看转写文字]</div><div id="vtxt_${m.id}" style="display:none;font-size:12px;color:var(--t);margin-top:4px;padding-top:4px;border-top:1px solid var(--bd)">${m.translatedContent?`<div style="color:var(--ac);margin-bottom:3px">${esc(m.translatedContent)}</div>`:''} ${esc(m.content)}</div>`:'';

// ═══════════ SEND ═══════════
async function send(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  // collect staged + current input
  const allTexts=[...stagedMsgs];
  if(text) allTexts.push(text);
  if(!allTexts.length||streaming||!currentSession)return;
  if(!cfg.base){openPanel('settings');return;}
  inp.value='';inp.style.height='auto';
  clearStaged();
  document.getElementById('sendBtn').className='send-btn off';

  if(editingId){
    messages=messages.map(m=>m.id===editingId?{...m,content:allTexts.join('\n')}:m);
    saveMessages();renderMessages();cancelEdit();return;
  }

  const q=quoteMsg;clearQuote();
  // add each staged message as separate bubble (optimistic UI)
  const firstText=allTexts[0];
  for(let i=0;i<allTexts.length;i++){
    const userMsg={id:(Date.now()+i).toString(),role:'user',content:allTexts[i],ts:new Date().toISOString(),type:'text',quote:i===0&&q?{id:q.id,content:q.content.slice(0,55)}:null};
    messages.push(userMsg);
  }
  saveMessages();renderMessages();
  // send combined content to backend (backend saves to supabase and queries full history)
  const combinedContent=allTexts.join('\n---msg---\n');

  // check if todo query
  const showTodo=isTodoQuery(text);
  // check if mentions anniversary/special day
  detectAnniv(text);

  streaming=true;
  showTyping();

  try{
    let systemPrompt='';
    if(memories.length){systemPrompt+='【记忆库】以下是重要记忆，请记住：\n'+memories.map((m,i)=>`${i+1}. ${m}`).join('\n')+'\n\n';}
    // inject time
    const d=new Date(),days=['周日','周一','周二','周三','周四','周五','周六'];
    systemPrompt+=`【当前时间】${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${days[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}\n\n`;
    // inject todos if relevant
    if(showTodo&&todos.length){
      systemPrompt+=`【今日清单】${todos.map(t=>`${t.done?'✓':'○'} ${t.text}`).join('、')}\n\n`;
    }
    // inject annivs
    if(annivs.length){
      const mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0'),today=`${mo}-${da}`;
      const todayAnnivs=annivs.filter(a=>a.date===today);
      if(todayAnnivs.length)systemPrompt+=`【今天的纪念日】${todayAnnivs.map(a=>a.name).join('、')}\n\n`;
    }

    const base=(cfg.apiBase||'https://api.anthropic.com').replace(/\/+$/,'');
    const isOfficial=base.includes('anthropic.com');
    const apiUrl=base.endsWith('/v1')?base+'/messages':base+'/v1/messages';
    const headers={'Content-Type':'application/json'};
    if(isOfficial){headers['x-api-key']=cfg.apiKey;headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';}
    else{headers['x-api-key']=cfg.apiKey;headers['Authorization']='Bearer '+cfg.apiKey;headers['anthropic-version']='2023-06-01';}

    // use backend if configured
    let reply='';
    if(cfg.base){
      const body={session_id:currentSession.id,content:combinedContent||text,model:cfg.model};
      if(cfg.apiKey)body.api_key=cfg.apiKey;
      if(cfg.apiBase)body.api_base=cfg.apiBase;
      if(cfg.systemPrompt)body.system_prompt_override=cfg.systemPrompt;
      if(q?.content)body.quote_content=q.content;
      // attach image if last user message has one
      const recentImgMsg=messages.filter(m=>m.role==='user'&&m.imageBase64).slice(-1)[0];
      if(recentImgMsg&&allTexts.length<=1){
        body.image_base64=recentImgMsg.imageBase64;
        body.image_mime=recentImgMsg.imageMime||'image/jpeg';
        // 清除已发送的图片数据，防止后续消息误带
        delete recentImgMsg.imageBase64;
        delete recentImgMsg.imageMime;
      }
      const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'HTTP '+r.status);}
      const data=await r.json();reply=data.content||'(空回复)';
    } else {
      const r=await fetch(apiUrl,{method:'POST',headers,body:JSON.stringify({model:cfg.model,max_tokens:4096,system:systemPrompt||undefined,messages:messages.filter(m=>m.role==='user'||m.role==='assistant').map(m=>{
            let content=m.content;
            if(m.quote&&m.role==='user')content=`[引用: "${m.quote.content}"]\n${content}`;
            return{role:m.role,content};
          })})});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status);}
      const data=await r.json();reply=data.content?.map(b=>b.text||'').join('')||'(空回复)';
    }

    hideTyping();
    const replyData = await (async()=>{try{const rr=await fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+currentSession.id+'?limit=20');const dd=await rr.json();return dd;}catch(e){return [];}})();
    // 取非voice气泡消息里最后一条的时间戳（voice气泡是本地生成的，ts可能不准）
    const realMsgs=messages.filter(m=>!m.id?.includes('_voice'));
    const lastTs=realMsgs.length?realMsgs[realMsgs.length-1].ts:'';
    const newMsgs=(replyData||[]).filter(m=>m.created_at>lastTs&&m.role==='assistant');
    const msgsToAdd=newMsgs.length?newMsgs.map(m=>({id:m.id.toString(),role:'assistant',content:m.content,innerThought:m.inner_thought||'',ts:m.created_at,type:'text',isVoice:m.is_voice||false,audioUrl:m.audio_url||null})):(()=>{const replyMsgs=(typeof data==='object'&&data.messages)||[{content:reply,inner:'',voice:false}];return replyMsgs.map((rm,i)=>({id:(Date.now()+i+100).toString(),role:'assistant',content:typeof rm==='string'?rm:rm.content,innerThought:typeof rm==='string'?'':rm.inner||'',ts:new Date().toISOString(),type:'text',isVoice:rm.voice||false}));})();

    // 逐条显示，每条间隔1秒，像真人发微信
    if(msgsToAdd.length<=1){
      if(msgsToAdd.length){
        const msg=msgsToAdd[0];
        if(!msg.isVoice)messages.push(msg);
      }
      saveMessages();renderMessages();
    } else {
      const first=msgsToAdd[0];
      if(!first.isVoice)messages.push(first);
      saveMessages();renderMessages();
      for(let i=1;i<msgsToAdd.length;i++){
        await new Promise(r=>setTimeout(r,1000));
        showTyping();
        await new Promise(r=>setTimeout(r,600));
        hideTyping();
        const msg=msgsToAdd[i];
        if(!msg.isVoice)messages.push(msg);
        saveMessages();renderMessages();
      }
    }

    // AI 标记了 [voice] 的消息，只发语音气泡
    for(const msg of msgsToAdd){
      if(msg.isVoice&&cfg.base){
        autoGenVoiceBubble(msg);
      }
    }
    // update session name if first message
    if(messages.filter(m=>m.role==='user').length===1){
      const name=text.slice(0,14)+(text.length>14?'...':'');
      sessions=sessions.map(s=>s.id===currentSession.id?{...s,name}:s);
      save(K.sessions,sessions);renderSessions();
    }

  }catch(err){
    hideTyping();
    messages.push({id:Date.now().toString(),role:'assistant',content:'⚠ '+err.message,ts:new Date().toISOString(),type:'error'});
    saveMessages();renderMessages();
  }finally{streaming=false;}
}

let callActive=false,callRecognition=null,callTimerInterval=null,callSeconds=0;
let callSilenceTimer=null,callTranscriptLog=[],callSpeaking=false;
let callStartedAt=null,ringTimer=null;

function startCall(){
  if(callActive)return;
  if(!cfg.base){alert('需要配置后端');return;}
  if(!('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){alert('请使用 Chrome 或安卓 Chrome');return;}
  document.getElementById('incomingCall').style.display='block';
  document.getElementById('ringStatus').textContent='响铃中...';
  const delay=2000+Math.random()*2000;
  ringTimer=setTimeout(()=>{
    document.getElementById('ringStatus').textContent='接听中...';
    setTimeout(acceptCall,800);
  },delay);
}

function acceptCall(){
  clearTimeout(ringTimer);
  document.getElementById('incomingCall').style.display='none';
  callActive=true;callTranscriptLog=[];callSeconds=0;
  callStartedAt=new Date().toISOString();
  document.getElementById('callWindow').style.display='block';
  document.getElementById('callBtn').style.color='var(--ac)';
  callTimerInterval=setInterval(()=>{
    callSeconds++;
    const m=String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s=String(callSeconds%60).padStart(2,'0');
    document.getElementById('callTimer').textContent=m+':'+s;
  },1000);
  makeDraggable(document.getElementById('callWindow'));
  const cardId='call_card_'+Date.now();
  window._callCardId=cardId;
  messages.push({id:cardId,role:'system',content:'📞 通话中',ts:new Date().toISOString(),type:'call-card',callActive:true});
  saveMessages();renderMessages();
  setCallStatus('在听...');
  startListening();
}

function rejectCall(){
  clearTimeout(ringTimer);
  document.getElementById('incomingCall').style.display='none';
}

function setCallStatus(txt){const el=document.getElementById('callStatus');if(el)el.textContent=txt;}

function animateCallWave(active){
  document.querySelectorAll('.cwave').forEach((el,i)=>{
    el.style.animation=active?('cwave '+(0.4+i*0.08)+'s ease-in-out infinite'):'none';
    el.style.opacity=active?'1':'0.4';
    if(!active)el.style.height='4px';
  });
}

function startListening(){
  if(!callActive||callSpeaking)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  callRecognition=new SR();
  callRecognition.lang='zh-CN';
  callRecognition.continuous=false;
  callRecognition.interimResults=true;
  let finalText='';
  callRecognition.onstart=()=>{setCallStatus('在听...');animateCallWave(false);};
  callRecognition.onresult=(e)=>{
    finalText='';let interim='';
    for(const r of e.results){if(r.isFinal)finalText+=r[0].transcript;else interim+=r[0].transcript;}
    if(interim||finalText)setCallStatus('你：'+(finalText||interim));
    clearTimeout(callSilenceTimer);
    if(finalText)callSilenceTimer=setTimeout(()=>sendCallMessage(finalText),1500);
  };
  callRecognition.onerror=(e)=>{if(e.error==='no-speech'&&callActive&&!callSpeaking)setTimeout(startListening,500);};
  callRecognition.onend=()=>{if(callActive&&!callSpeaking)setTimeout(startListening,300);};
  try{callRecognition.start();}catch(e){}
}

async function sendCallMessage(text){
  if(!callActive||!text.trim())return;
  clearTimeout(callSilenceTimer);
  if(callRecognition){try{callRecognition.abort();}catch(e){}}
  callTranscriptLog.push({role:'user',content:text,ts:new Date().toISOString()});
  setCallStatus('他在想...');animateCallWave(false);callSpeaking=true;
  try{
    const body={session_id:currentSession?.id,content:'[通话中] '+text,model:cfg.model,is_voice:true,call_mode:true};
    if(cfg.apiKey)body.api_key=cfg.apiKey;
    if(cfg.apiBase)body.api_base=cfg.apiBase;
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const reply=(data.messages?.[0]?.content)||data.content||'';
    if(!reply)throw new Error('空回复');
    callTranscriptLog.push({role:'assistant',content:reply,ts:new Date().toISOString()});
    setCallStatus('他：'+reply.slice(0,30)+(reply.length>30?'...':''));
    animateCallWave(true);
    await playCallTTS(reply);
    setCallStatus('在听...');
  }catch(e){
    console.error('通话消息失败:',e.message);
    setCallStatus('出错了，继续说...');
  }finally{
    callSpeaking=false;animateCallWave(false);
    if(callActive)startListening();
  }
}

async function playCallTTS(text){
  return new Promise(async(resolve)=>{
    try{
      const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/voice/tts',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:text.slice(0,300),emotion:guessEmotion(text),channel:cfg.ttsChannel||'minimax',lang:cfg.ttsLang||'zh',call_mode:true}),
      });
      if(!r.ok){resolve();return;}
      const ct=r.headers.get('content-type')||'';
      let audioUrl;
      if(ct.includes('application/json')){const d=await r.json();audioUrl=d.audioUrl;}
      else audioUrl=URL.createObjectURL(await r.blob());
      if(!audioUrl){resolve();return;}
      if(currentAudio){currentAudio.pause();currentAudio=null;}
      currentAudio=new Audio(audioUrl);
      currentAudio.onended=()=>{currentAudio=null;resolve();};
      currentAudio.onerror=resolve;
      currentAudio.play();
    }catch(e){resolve();}
  });
}

async function endCall(){
  if(!callActive)return;
  callActive=false;callSpeaking=false;
  clearTimeout(callSilenceTimer);clearInterval(callTimerInterval);
  if(callRecognition){try{callRecognition.abort();}catch(e){}}
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  setCallStatus('通话结束');
  await new Promise(r=>setTimeout(r,800));
  document.getElementById('callWindow').style.display='none';
  document.getElementById('callBtn').style.color='';
  animateCallWave(false);
  if(window._callCardId){
    const card=messages.find(m=>m.id===window._callCardId);
    if(card){
      const m=String(Math.floor(callSeconds/60)).padStart(2,'0');
      const s=String(callSeconds%60).padStart(2,'0');
      card.content='📞 通话 '+m+':'+s;card.callActive=false;
    }
    window._callCardId=null;
  }
  saveMessages();renderMessages();
  if(callTranscriptLog.length>0&&currentSession){
    fetch(cfg.base.replace(/\/+$/,'')+'/api/call/save',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:currentSession.id,transcript:callTranscriptLog,duration:callSeconds,started_at:callStartedAt}),
    }).catch(()=>{});
  }
  callTranscriptLog=[];callStartedAt=null;
}

async function renderCallRecords(){
  if(!cfg.base||!currentSession)return;

    </div>`;

function makeDraggable(el){
  let sx=0,sy=0;
  const onStart=(e)=>{
    const p=e.touches?e.touches[0]:e;
    sx=p.clientX;sy=p.clientY;
    document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('mouseup',onEnd);document.addEventListener('touchend',onEnd);
  };
  const onMove=(e)=>{
    if(e.cancelable)e.preventDefault();
    const p=e.touches?e.touches[0]:e;
    const rect=el.getBoundingClientRect();
    el.style.left=(rect.left+(p.clientX-sx))+'px';
    el.style.top=(rect.top+(p.clientY-sy))+'px';
    el.style.right='auto';el.style.bottom='auto';
    sx=p.clientX;sy=p.clientY;
  };
  const onEnd=()=>{
    document.removeEventListener('mousemove',onMove);document.removeEventListener('touchmove',onMove);
    document.removeEventListener('mouseup',onEnd);document.removeEventListener('touchend',onEnd);
  };
  el.addEventListener('mousedown',onStart);el.addEventListener('touchstart',onStart,{passive:true});
}
let mediaRecorder=null;
let audioChunks=[];
let isRecording=false;
let waveAnimTimer=null;

function toggleVoiceRec(){
  const overlay=document.getElementById('voiceOverlay');
  overlay.style.display='flex';
}

function startVoiceRec(e){
  e.preventDefault();
  if(isRecording)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    isRecording=true;
    audioChunks=[];
    window._recStartTime=Date.now();
    mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    document.getElementById('voiceStatus').textContent='录音中...';
    document.getElementById('voiceRecordBtn').style.background='#c46';
    waveAnimTimer=setInterval(()=>{
      document.querySelectorAll('.wave-bar').forEach(b=>{
        b.style.height=Math.random()*32+4+'px';
        b.style.opacity='1';
      });
    },150);
  }).catch(()=>{alert('需要麦克风权限');});
}

async function stopVoiceRec(e){
  e.preventDefault();
  if(!isRecording||!mediaRecorder)return;
  isRecording=false;
  clearInterval(waveAnimTimer);
  document.getElementById('voiceStatus').textContent='处理中...';
  document.getElementById('voiceRecordBtn').style.background='var(--ac)';

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());

  mediaRecorder.onstop=async()=>{
    const duration=Date.now()-(window._recStartTime||0);
    if(duration<800){
      // 录音太短，丢弃
      document.getElementById('voiceOverlay').style.display='none';
      return;
    }
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    const localUrl=URL.createObjectURL(blob);
    document.getElementById('voiceOverlay').style.display='none';

    if(!cfg.base){alert('需要配置后端才能发语音');return;}

    // 上传录音到后端 Storage 持久化
    let audioUrl=localUrl;
    try{
      const fd2=new FormData();
      fd2.append('audio',blob,'voice.webm');
      const uploadRes=await fetch(cfg.base.replace(/\/+$/,'')+'/api/voice/upload',{method:'POST',body:fd2});
      if(uploadRes.ok){
        const uploadData=await uploadRes.json();
        if(uploadData.audioUrl)audioUrl=uploadData.audioUrl;
      }
    }catch(e){console.log('录音上传失败，使用本地URL');}

    const fd=new FormData();
    fd.append('audio',blob,'voice.webm');
    try{
      const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/voice/transcribe',{method:'POST',body:fd});
      const d=await r.json();
      if(d.text){
        const voiceMsg={
          id:Date.now().toString(),
          role:'user',
          content:d.text,
          emotion:d.emotion||'',
          ts:new Date().toISOString(),
          type:'voice',
          audioUrl,
        };
        messages.push(voiceMsg);
        saveMessages();renderMessages();
        await sendVoiceMessage(d.text, d.emotion, audioUrl);
      }
    }catch(err){
      console.error('语音转写失败:',err);
      alert('转写失败，请重试');
    }
  };
}

function cancelVoiceRec(){
  if(mediaRecorder&&isRecording){
    isRecording=false;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    clearInterval(waveAnimTimer);
  }
  document.getElementById('voiceOverlay').style.display='none';
}

async function sendVoiceMessage(text, emotion, audioUrl){
  if(!currentSession||!cfg.base)return;
  showTyping();
  try{
    const emotionNote=emotion?`[语音情绪: ${emotion}] `:'';
    const body={
      session_id:currentSession.id,
      content:emotionNote+text,
      model:cfg.model,
      is_voice:true,
      audio_url:audioUrl||null,
    };
    if(cfg.apiKey)body.api_key=cfg.apiKey;
    if(cfg.apiBase)body.api_base=cfg.apiBase;
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    hideTyping();
    const replyData=await(async()=>{try{const rr=await fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+currentSession.id+'?limit=20');return await rr.json();}catch(e){return[];}})();
    const lastTs=messages.length?messages[messages.length-1].ts:'';
    const newMsgs=(replyData||[]).filter(m=>m.created_at>lastTs&&m.role==='assistant');
    if(newMsgs.length){
      for(const m of newMsgs)messages.push({id:m.id.toString(),role:'assistant',content:m.content,innerThought:m.inner_thought||'',ts:m.created_at,type:'text'});
    }
    saveMessages();renderMessages();
  }catch(e){
    hideTyping();
    messages.push({id:Date.now().toString(),role:'assistant',content:'⚠ '+e.message,ts:new Date().toISOString(),type:'error'});
    saveMessages();renderMessages();
  }
}

// AI 自动语音气泡（开启 aiVoiceReply 时调用）
function guessEmotion(text){
  if(/哈哈|哈哈哈|😄|😊|开心|好玩|有趣/.test(text))return '开心';
  if(/啊|！！|!!!|兴奋|太好了/.test(text))return '兴奋';
  if(/难过|伤心|哭|😢|😭/.test(text))return '难过';
  if(/累|困|疲惫|😴/.test(text))return '疲惫';
  if(/宝宝|嘛|呢|撒娇|🥺/.test(text))return '撒娇';
  if(/不行|不对|别这样|😤/.test(text))return '生气';
  return '平静';
}
async function autoGenVoiceBubble(msg){
  if(!cfg.base||!msg?.content)return;
  try{
    const emotion=guessEmotion(msg.content);
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/voice/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:msg.content.slice(0,500),emotion,channel:cfg.ttsChannel||'minimax',lang:cfg.ttsLang||'zh'}),
    });
    if(!r.ok)return;
    const contentType=r.headers.get('content-type')||'';
    let audioUrl;
    if(contentType.includes('application/json')){
      const d=await r.json();
      if(!d.audioUrl)return;
      audioUrl=d.audioUrl;
      if(d.translatedText)msg._translatedText=d.translatedText;
      // 把 audioUrl 存回数据库，刷新后还能播放
      if(msg.id&&!msg.id.includes('_voice')){
        fetch(cfg.base.replace(/\/+$/,'')+'/api/messages/'+msg.id+'/audio',{
          method:'PATCH',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({audio_url:audioUrl}),
        }).catch(()=>{});
      }
    } else {
      const audioBlob=await r.blob();
      audioUrl=URL.createObjectURL(audioBlob);
    }
    // 检查是否已有语音气泡（防止重复）
    const existingVoiceIdx=messages.findIndex(m=>m.id===msg.id+'_voice');
    if(existingVoiceIdx>=0){
      messages[existingVoiceIdx].audioUrl=audioUrl;
      saveMessages();renderMessages();
      return;
    }
    // 刷新后 voice 消息本身就是气泡，直接更新 audioUrl
    const selfIdx=messages.findIndex(m=>m.id===msg.id&&m.type==='voice');
    if(selfIdx>=0){
      messages[selfIdx].audioUrl=audioUrl;
      saveMessages();renderMessages();
      return;
    }
    const voiceBubble={
      id:msg.id+'_voice',
      role:'assistant',
      content:msg.content,
      translatedContent:msg._translatedText||null,
      ts:msg.ts,
      type:'voice',
      audioUrl,
      emotion,
    };
    const idx=messages.findIndex(m=>m.id===msg.id);
    if(idx>=0){messages.splice(idx+1,0,voiceBubble);}
    else{messages.push(voiceBubble);}
    saveMessages();renderMessages();
  }catch(e){
    console.log('自动语音气泡生成失败:',e.message);
  }
}
let currentAudio=null;
async function playTTS(e, msgId){
  e.stopPropagation();
  const btn=e.target;
  const m=messages.find(m=>m.id===msgId);
  if(!m||!cfg.base)return;

  // 如果已有缓存音频直接播放
  if(m.audioUrl){
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    currentAudio=new Audio(m.audioUrl);
    currentAudio.play();
    btn.textContent='⏸';
    currentAudio.onended=()=>{btn.textContent='🔊';currentAudio=null;};
    return;
  }

  btn.textContent='⏳';
  try{
    const emotion=m.emotion||guessEmotion(m.content);
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/voice/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:m.content.slice(0,500),emotion,channel:cfg.ttsChannel||'minimax',lang:cfg.ttsLang||'zh'}),
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      throw new Error(err.error||'TTS 失败');
    }
    const contentType=r.headers.get('content-type')||'';
    let audioUrl;
    if(contentType.includes('application/json')){
      const d=await r.json();
      if(d.audioUrl){audioUrl=d.audioUrl;}
      else throw new Error(d.error||'TTS 失败');
    } else {
      const audioBlob=await r.blob();
      audioUrl=URL.createObjectURL(audioBlob);
    }
    m.audioUrl=audioUrl;
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    currentAudio=new Audio(audioUrl);
    currentAudio.play();
    btn.textContent='⏸';
    currentAudio.onended=()=>{btn.textContent='🔊';currentAudio=null;};
  }catch(err){
    btn.textContent='🔊';
    alert('语音播放失败：'+err.message+'\n（可能需要充值或检查API key）');
  }
}

// ═══════════ IMAGE ═══════════
function sendImage(e){
  const f=e.target.files[0];if(!f)return;
  e.target.value='';
  const url=URL.createObjectURL(f);

  // 压缩图片：最大 1200px，quality 0.75，控制 base64 体积
  const img=new Image();
  img.onload=function(){
    const MAX=1200;
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){
      if(w>h){h=Math.round(h*MAX/w);w=MAX;}
      else{w=Math.round(w*MAX/h);h=MAX;}
    }
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    const mime='image/jpeg';
    const b64=canvas.toDataURL(mime,0.75).split(',')[1];
    const m={id:Date.now().toString(),role:'user',content:'',ts:new Date().toISOString(),type:'image',imageUrl:url,imageBase64:b64,imageMime:mime};
    messages.push(m);saveMessages();renderMessages();
    document.getElementById('msgInput').focus();
  };
  img.onerror=function(){
    // fallback：直接读原始文件
    const reader=new FileReader();
    reader.onload=function(ev){
      const b64=ev.target.result.split(',')[1];
      const m={id:Date.now().toString(),role:'user',content:'',ts:new Date().toISOString(),type:'image',imageUrl:url,imageBase64:b64,imageMime:f.type||'image/jpeg'};
      messages.push(m);saveMessages();renderMessages();
      document.getElementById('msgInput').focus();
    };
    reader.readAsDataURL(f);
  };
  img.src=url;
}

function detectAnniv(text){
  const patterns=[/今天是(.{2,15})(周年|纪念日|生日|一周年|两周年|三周年)/,/(.{2,15})(周年|纪念日|生日)是今天/,/(\d+)(月)(\d+)(日|号)是(.{2,15})/];
  for(const p of patterns){const m=text.match(p);if(m){const name=m[1]||m[5];const d=new Date(),mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');const existing=annivs.find(a=>a.name===name);if(!existing){annivs.push({id:Date.now().toString(),name,date:`${mo}-${da}`});save(K.annivs,annivs);}}}
}
function checkAnnivs(){
  const d=new Date(),mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0'),today=`${mo}-${da}`;
  const hits=annivs.filter(a=>a.date===today);
  if(hits.length){
    const el=document.getElementById('annivAlert');
    document.getElementById('annivText').textContent='🎉 今天是「'+hits[0].name+'」！';
    el.style.display='flex';setTimeout(()=>el.style.display='none',8000);
  }
}

async function fetchModels(presetIdx){
  const btn=document.getElementById('fetchBtn');btn.textContent='加载中...';btn.disabled=true;
  try{
    const base=(document.getElementById('pBase').value||cfg.apiBase||'').replace(/\/+$/,'');
    const key=document.getElementById('pKey').value||cfg.apiKey||'';
    const url=base.endsWith('/v1')?base+'/models':base+'/v1/models';
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+key,'x-api-key':key}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const list=(data.data||data.models||[]).map(m=>typeof m==='string'?m:(m.id||'')).filter(Boolean);
    const el=document.getElementById('modelListEl');
    el.style.display='block';
    document.getElementById('modelSearchWrap').style.display='block';
    window._allModels=list;
    renderModelList(list);
  }catch(e){
    // try backend proxy
    if(cfg.base){
      try{
        const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_base:document.getElementById('pBase').value,api_key:document.getElementById('pKey').value})});
        const data=await r.json();
        const el=document.getElementById('modelListEl');
        el.style.display='block';
        el.innerHTML=(data||[]).map(m=>`<div class="model-item" onclick="document.getElementById('pModel').value='${m.id}'">${m.id}</div>`).join('');
      }catch(e2){alert('拉取失败，请手动填写模型名称');}
    } else alert('拉取失败: '+e.message);
  }
  btn.textContent='拉取模型';btn.disabled=false;
}

function renderModelList(list){
  const el=document.getElementById('modelListEl');
  const cur=document.getElementById('pModel')?.value||'';
  el.innerHTML=list.map(m=>`<div class="model-item${cur===m?' sel':''}" onclick="document.getElementById('pModel').value='${m}';document.querySelectorAll('.model-item').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')">${m}</div>`).join('');
}
function filterModels(){
  const q=document.getElementById('modelSearch')?.value?.toLowerCase()||'';
  const filtered=(window._allModels||[]).filter(m=>m.toLowerCase().includes(q));
  renderModelList(filtered);
}
function savePreset(i){
  const p={id:i>=0?(cfg.presets[i].id||Date.now().toString()):Date.now().toString(),name:document.getElementById('pName').value.trim(),apiBase:document.getElementById('pBase').value.trim(),apiKey:document.getElementById('pKey').value.trim(),model:document.getElementById('pModel').value.trim()};
  if(!p.name||!p.apiBase||!p.model){alert('请填写名称、API地址和模型');return;}
  if(i>=0)cfg.presets[i]=p;else cfg.presets.push(p);

let memEditId=null;

  const el=document.getElementById('memList');if(!el)return;
  if(!cfg.base){el.innerHTML='<p style="color:var(--tf);font-size:12px;text-align:center;padding:10px">需要配置后端地址</p>';return;}
  el.innerHTML='<p style="color:var(--tf);font-size:12px;text-align:center;padding:10px">加载中...</p>';
  const url=cfg.base.replace(/\/+$/,'')+'/api/memories/all'+(q?'?q='+encodeURIComponent(q):'');
  fetch(url).then(r=>r.json()).then(data=>{
    if(!el)return;
    if(!data.length){el.innerHTML='<p style="color:var(--tf);font-size:12px;text-align:center;padding:16px">还没有记忆</p>';return;}
    el.innerHTML=data.map(m=>`
      <div style="background:var(--s2);border:1px solid ${m.memory_type==='core'?'rgba(212,165,116,.3)':'var(--bd)'};border-radius:8px;padding:8px 10px;margin-bottom:6px">
        ${memEditId===m.id?`

          </div>
        `:`
          <div style="display:flex;align-items:flex-start;gap:6px">
            <span style="flex:1;font-size:12.5px;line-height:1.5">${esc(m.summary)}</span>
            <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
              <span style="font-size:9px;color:${m.memory_type==='core'?'var(--ac)':'var(--tf)'};text-align:right">${m.memory_type==='core'?'核心':'情节'}</span>

                <button onclick="softDelMem(${m.id})" style="background:none;border:none;color:var(--tf);cursor:pointer;font-size:11px">🗑</button>

function searchMems(){
  const q=document.getElementById('memSearch')?.value||'';
  clearTimeout(window._memSearchTimer);
  window._memSearchTimer=setTimeout(()=>loadMemList(q),300);
}

function startMemEdit(id){memEditId=id;loadMemList(document.getElementById('memSearch')?.value||'');}

function saveMemEdit(id){
  const v=document.getElementById('memEditInp_'+id)?.value?.trim();
  if(!v||!cfg.base)return;
  fetch(cfg.base.replace(/\/+$/,'')+'/api/memories/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary:v})})
    .then(()=>{memEditId=null;loadMemList(document.getElementById('memSearch')?.value||'');})
    .catch(e=>alert(e.message));
}

function softDelMem(id){
  if(!confirm('移入回收站？'))return;
  if(!cfg.base)return;
  fetch(cfg.base.replace(/\/+$/,'')+'/api/memories/'+id,{method:'DELETE'})
    .then(()=>loadMemList(document.getElementById('memSearch')?.value||''))
    .catch(e=>alert(e.message));
}

function showMemTrash(){
  const el=document.getElementById('memList');if(!el||!cfg.base)return;
  document.getElementById('memTrashBtn').textContent='← 返回';
  document.getElementById('memTrashBtn').onclick=()=>{document.getElementById('memTrashBtn').textContent='🗑 回收站';document.getElementById('memTrashBtn').onclick=showMemTrash;loadMemList('');};
  el.innerHTML='<p style="color:var(--tf);font-size:11px;margin-bottom:8px">回收站中的记忆不会被AI读取，可恢复或永久删除</p>';
  fetch(cfg.base.replace(/\/+$/,'')+'/api/memories/trash').then(r=>r.json()).then(data=>{
    if(!data.length){el.innerHTML+='<p style="color:var(--tf);font-size:12px;text-align:center;padding:10px">回收站是空的</p>';return;}
    el.innerHTML+=data.map(m=>`
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;margin-bottom:6px;opacity:.7">
        <div style="font-size:12.5px;margin-bottom:5px">${esc(m.summary)}</div>
        <div style="display:flex;gap:5px">
          <button onclick="restoreMem(${m.id})" style="flex:1;padding:5px;background:var(--acl);border:1px solid var(--acb);border-radius:6px;color:var(--ac);font-size:11px;cursor:pointer">恢复</button>
          <button onclick="permDelMem(${m.id})" style="flex:1;padding:5px;background:rgba(200,80,80,.1);border:1px solid rgba(200,80,80,.2);border-radius:6px;color:#c46;font-size:11px;cursor:pointer">永久删除</button>
        </div>
      </div>`).join('');
  }).catch(()=>{});
}

function restoreMem(id){
  if(!cfg.base)return;
  fetch(cfg.base.replace(/\/+$/,'')+'/api/memories/'+id+'/restore',{method:'POST'})
    .then(()=>showMemTrash()).catch(e=>alert(e.message));
}

function permDelMem(id){
  if(!confirm('永久删除？此操作不可撤销。'))return;
  if(!cfg.base)return;
  fetch(cfg.base.replace(/\/+$/,'')+'/api/memories/'+id+'/permanent',{method:'DELETE'})
    .then(()=>showMemTrash()).catch(e=>alert(e.message));
}

async function addMemManual(){
  const v=document.getElementById('memAddInp')?.value?.trim();
  if(!v)return;
  if(cfg.base){
    try{
      await fetch(cfg.base.replace(/\/+$/,'')+'/api/memories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary:v})});
      document.getElementById('memAddInp').value='';
      loadMemList('');loadMemStats();
    }catch(e){alert(e.message);}
  } else {
    memories.push(v);save(K.mems,memories);
    document.getElementById('memAddInp').value='';
    loadMemList('');
  }
}

function loadDiaryList(){

    .then(data=>{
      const list=document.getElementById('diaryList');

async function forceDiary(){
  if(!cfg.base||!currentSession){alert('需要先连接后端并开始对话');return;}
  const status=document.getElementById('diaryStatus');
  const btn=document.querySelector('#panelContent .p-btn.ghost');
  if(status)status.textContent='⏳ 生成中...';
  if(btn)btn.disabled=true;
  try{
    const r=await fetch(cfg.base.replace(/\/+$/,'')+'/api/diary/force',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:currentSession.id,
        api_key:cfg.apiKey,
        api_base:cfg.apiBase,
        model:cfg.model,
      })
    });
    const data=await r.json();
    if(data.wrote){
      if(status)status.textContent='✅ 写好了！';
      loadDiaryList();
    } else {
      if(status)status.textContent='💭 他觉得今天没什么特别值得记录的（reason: '+(data.reason||data.error||'无')+')';
    }
  }catch(e){
    if(status)status.textContent='❌ 出错了: '+e.message;
  }finally{
    if(btn)btn.disabled=false;
  }
}

    </div>`;
}
function toggleCfg(key){cfg[key]=!cfg[key];save(K.cfg,cfg);renderPanel('settings');if(key==='showAvatar')renderMessages();}
function saveCfgSettings(){
  cfg.base=document.getElementById('cfgBase').value.trim();
  cfg.systemPrompt=document.getElementById('cfgPrompt').value.trim();
  save(K.cfg,cfg);
  // also save base to a separate key as backup
  if(cfg.base)localStorage.setItem('cc_base_backup',cfg.base);
  // sync system prompt to backend
  if(cfg.base){
    fetch(cfg.base.replace(/\/+$/,'')+'/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_prompt:cfg.systemPrompt})})
      .catch(e=>console.error('同步设置失败:',e));
  }
  closePanel();
}
function addAnniv(){const n=document.getElementById('annivName').value.trim(),d=document.getElementById('annivDate').value.trim();if(!n||!d)return;annivs.push({id:Date.now().toString(),name:n,date:d});save(K.annivs,annivs);renderPanel('settings');}
function delAnniv(i){annivs.splice(i,1);save(K.annivs,annivs);renderPanel('settings');}

// ═══════════ UTILS ═══════════
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
